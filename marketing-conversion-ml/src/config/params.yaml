# params.yaml - Hyperparameter configuration for ML models
# Contains all model-specific hyperparameters and training settings

# Random Forest Classifier hyperparameters
random_forest:
  n_estimators: 200  # Number of decision trees in the forest
  max_depth: 15  # Maximum depth of each decision tree
  min_samples_split: 5  # Minimum samples required to split a node
  min_samples_leaf: 2  # Minimum samples required at a leaf node
  random_state: 42  # Random seed for reproducibility
  n_jobs: -1  # Use all available CPU cores for parallel processing

# Gradient Boosting Classifier hyperparameters
gradient_boosting:
  n_estimators: 150  # Number of boosting stages
  learning_rate: 0.1  # Step size shrinkage to prevent overfitting
  max_depth: 5  # Maximum depth of individual regression estimators
  min_samples_split: 5  # Minimum samples required to split a node
  min_samples_leaf: 2  # Minimum samples required at a leaf node
  random_state: 42  # Random seed for reproducibility

# Logistic Regression hyperparameters
logistic_regression:
  C: 1.0  # Inverse of regularization strength (smaller = stronger regularization)
  max_iter: 1000  # Maximum number of iterations for solver convergence
  random_state: 42  # Random seed for reproducibility

# XGBoost Classifier hyperparameters
xgboost:
  n_estimators: 200  # Number of gradient boosted trees
  learning_rate: 0.1  # Step size shrinkage
  max_depth: 6  # Maximum tree depth for base learners
  min_child_weight: 3  # Minimum sum of instance weight needed in a child
  subsample: 0.8  # Subsample ratio of the training instances
  colsample_bytree: 0.8  # Subsample ratio of columns when constructing each tree
  random_state: 42  # Random seed for reproducibility
  use_label_encoder: false  # Disable deprecated label encoder warning
  eval_metric: "logloss"  # Evaluation metric for validation data

# Cross-validation settings
cross_validation:
  n_splits: 5  # Number of folds for cross-validation
  shuffle: true  # Whether to shuffle data before splitting into folds
  random_state: 42  # Random seed for reproducibility
